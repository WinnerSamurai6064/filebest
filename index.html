<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Glass FM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080d;
    --row-h: 64px;
    --icon: 34px;
    --radius: 16px;
    --text: #f2f0f8;
    --text-dim: #9a97ad;
    --text-faint: #67637c;
    --warm: #ff9a6c;
    --cool: #8b7bff;
    --mono-accent: #7cffc4;
    --danger: #ff6f6f;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100%;
    overscroll-behavior-y:none;
    position:relative;
  }

  /* ---- ambient background ---- */
  .ambient{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .ambient::before, .ambient::after{
    content:''; position:absolute; width:70vw; height:70vw; border-radius:50%;
    filter:blur(70px); opacity:0.16;
  }
  .ambient::before{ background:var(--warm); top:-20%; left:-15%; animation:driftA 22s ease-in-out infinite alternate; }
  .ambient::after{ background:var(--cool); bottom:-25%; right:-15%; animation:driftB 26s ease-in-out infinite alternate; }
  @keyframes driftA{ from{transform:translate(0,0) scale(1);} to{transform:translate(6%,4%) scale(1.08);} }
  @keyframes driftB{ from{transform:translate(0,0) scale(1);} to{transform:translate(-5%,-6%) scale(1.05);} }
  @media (prefers-reduced-motion: reduce){
    .ambient::before, .ambient::after{ animation:none !important; }
  }

  /* ---- App shell ---- */
  #app{
    position:relative; z-index:1;
    max-width:560px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column;
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x:hidden;
  }

  header{
    position:sticky; top:0; z-index:5;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;
    background:linear-gradient(var(--bg) 60%, transparent);
    backdrop-filter: blur(6px);
  }
  .title-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:36px; }
  .title-normal, .title-selecting{ display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; }
  .title-selecting{ display:none; }
  header.selecting .title-normal{ display:none; }
  header.selecting .title-selecting{ display:flex; }
  h1{ font-family:var(--font-display); font-size:21px; margin:0; font-weight:650; letter-spacing:-0.01em; }
  .sel-count{ font-family:var(--font-display); font-size:16px; font-weight:600; color:var(--mono-accent); }
  .header-actions{ display:flex; gap:8px; }

  .path-row{
    display:flex; align-items:center; gap:2px;
    margin-top:10px; overflow-x:auto; white-space:nowrap;
    font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);
    scrollbar-width:none;
  }
  .path-row::-webkit-scrollbar{display:none;}
  .crumb{ padding:3px 1px; cursor:pointer; color:var(--text-dim); }
  .crumb:last-child{ color:var(--mono-accent); font-weight:600; }
  .crumb-sep{ color:var(--text-faint); padding:0 2px;}
  .cursor{
    display:inline-block; width:7px; height:13px; margin-left:5px; vertical-align:-2px;
    background:var(--mono-accent); animation:blink 1.1s step-end infinite;
  }
  @keyframes blink{ 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  @media (prefers-reduced-motion: reduce){ .cursor{ animation:none; } }

  .iconbtn{
    width:36px; height:36px; border-radius:12px; border:none;
    background:rgba(255,255,255,0.06);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex:none; transition:transform .12s ease, background .12s ease;
  }
  .iconbtn:active{ background:rgba(255,255,255,0.13); transform:scale(0.92); }
  .iconbtn.active{ background:linear-gradient(135deg,var(--warm),var(--cool)); color:#08080d; }
  .iconbtn svg{ width:18px; height:18px; }

  /* ---- List ---- */
  #list{ flex:1; padding:6px 12px 110px; }
  .empty{ text-align:center; color:var(--text-faint); font-size:14px; padding:70px 20px; font-family:var(--font-mono); }

  .row{
    position:relative;
    height:var(--row-h);
    margin-bottom:10px;
    border-radius:var(--radius);
    display:flex; align-items:center;
    padding:0 14px;
    gap:10px;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
    animation: rowIn .32s ease both;
    transition:transform .15s ease;
    box-shadow:
      -8px 10px 24px -14px rgba(255,154,108,0.25),
      8px 12px 26px -14px rgba(139,123,255,0.28);
  }
  .row:active{ transform:scale(0.985); }
  @keyframes rowIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .row .glass-bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:fill; border-radius:var(--radius);
    pointer-events:none; opacity:0.92;
  }
  .row .tint{ position:absolute; inset:0; border-radius:var(--radius); background:rgba(8,8,13,0.30); pointer-events:none; }
  .row:active .tint{ background:rgba(8,8,13,0.44); }

  .row::after{
    content:''; position:absolute; inset:0; border-radius:var(--radius);
    background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,0.4) 50%, transparent 58%);
    transform:translateX(-130%);
    pointer-events:none; mix-blend-mode:screen; z-index:2;
  }
  .row.sweep::after{ animation:sweep .55s ease; }
  @keyframes sweep{ from{transform:translateX(-130%);} to{transform:translateX(130%);} }

  .checkbox{
    display:none; position:relative; z-index:3; flex:none;
    width:22px; height:22px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.6);
    align-items:center; justify-content:center;
    transition:background .15s ease, border-color .15s ease;
  }
  #list.selecting .checkbox{ display:flex; }
  #list.selecting .chev, #list.selecting .kebab{ display:none; }
  .checkbox svg{ width:12px; height:12px; opacity:0; transform:scale(0.4); transition:opacity .15s ease, transform .15s ease; }
  .row.checked .checkbox{ background:linear-gradient(135deg,var(--warm),var(--cool)); border-color:transparent; }
  .row.checked .checkbox svg{ opacity:1; transform:scale(1); }

  .row .icon-wrap{
    position:relative; z-index:1; width:var(--icon); height:var(--icon); flex:none;
    display:flex; align-items:center; justify-content:center;
  }
  .row .icon-wrap img{ width:100%; height:100%; object-fit:contain; }
  .row .icon-wrap.file-icon{ border-radius:8px; background:rgba(255,255,255,0.15); font-size:14px; font-family:var(--font-mono); }

  .row .meta{ position:relative; z-index:1; min-width:0; flex:1; }
  .row .name{
    font-size:15px; font-weight:600; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 1px 3px rgba(0,0,0,0.35);
  }
  .row .sub{
    font-family:var(--font-mono); font-size:11.5px; color:rgba(255,255,255,0.75);
    margin-top:3px; text-shadow:0 1px 2px rgba(0,0,0,0.3);
  }
  .row .chev{ position:relative; z-index:1; color:rgba(255,255,255,0.55); flex:none; display:flex; }
  .row .chev svg{ width:16px; height:16px; }
  .row .kebab{
    position:relative; z-index:3; flex:none; color:rgba(255,255,255,0.8);
    width:28px; height:28px; border-radius:9px; display:flex; align-items:center; justify-content:center;
  }
  .row .kebab:active{ background:rgba(255,255,255,0.16); }
  .row .kebab svg{ width:17px; height:17px; }

  /* ---- Bottom dock ---- */
  #dropzone{
    position:fixed; left:0; right:0; bottom:0;
    max-width:560px; margin:0 auto;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 42%);
    z-index:6;
  }
  .dock-normal, .dock-select{ display:flex; gap:10px; }
  .dock-select{ display:none; }
  #dropzone.selecting .dock-normal{ display:none; }
  #dropzone.selecting .dock-select{ display:flex; }

  .fab{
    flex:1; height:52px; border-radius:16px; border:1px solid rgba(255,255,255,0.10);
    background:rgba(255,255,255,0.07);
    color:var(--text); font-size:14px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; transition:transform .12s ease;
  }
  .fab:active{ transform:scale(0.96); }
  .fab.primary{ background:linear-gradient(135deg,var(--warm),var(--cool)); color:#08080d; border:none; }
  .fab.danger{ background:rgba(255,111,111,0.14); color:var(--danger); border-color:rgba(255,111,111,0.25); }
  .fab svg{ width:18px; height:18px; }
  #fileInput{ display:none; }

  /* ---- Overlays: preview + picker share base look ---- */
  .overlay{
    position:fixed; inset:0; z-index:20; background:rgba(5,5,9,0.88);
    backdrop-filter:blur(16px); display:none; flex-direction:column;
  }
  .overlay.open{ display:flex; }
  .overlay-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; gap:10px;
  }
  .overlay-name{ font-size:14px; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .overlay-actions{ display:flex; gap:8px; flex:none; }
  .overlay-body{ flex:1; overflow:auto; padding:0 16px 24px; display:flex; align-items:flex-start; justify-content:center; }
  .overlay-body img, .overlay-body video{ max-width:100%; border-radius:12px; }
  .overlay-body pre, .editor{
    width:100%; margin:0; padding:16px; box-sizing:border-box;
    background:rgba(255,255,255,0.045); border:1px solid rgba(255,255,255,0.06);
    border-radius:12px; font-size:12.5px; line-height:1.55; color:#dcd9ec;
    white-space:pre-wrap; word-break:break-word; font-family:var(--font-mono);
  }
  .editor{ min-height:50vh; resize:vertical; outline:none; }
  .editor:focus{ border-color:rgba(139,123,255,0.5); }
  .overlay-fallback{ color:var(--text-faint); font-size:14px; margin-top:60px; text-align:center; font-family:var(--font-mono); }

  #pickerBody{ flex:1; overflow:auto; padding:6px 12px 100px; }
  .picker-row{
    position:relative; height:56px; margin-bottom:8px; border-radius:14px;
    display:flex; align-items:center; gap:10px; padding:0 14px; cursor:pointer;
  }
  .picker-row .glass-bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:fill; border-radius:14px; opacity:0.85; }
  .picker-row .tint{ position:absolute; inset:0; border-radius:14px; background:rgba(8,8,13,0.34); }
  .picker-row:active .tint{ background:rgba(8,8,13,0.48); }
  .picker-row img.icn{ position:relative; z-index:1; width:26px; height:26px; object-fit:contain; }
  .picker-row .pname{ position:relative; z-index:1; color:#fff; font-weight:600; font-size:14.5px; text-shadow:0 1px 3px rgba(0,0,0,0.35); }
  .picker-empty{ text-align:center; color:var(--text-faint); font-family:var(--font-mono); font-size:13px; padding:40px 20px; }
  .picker-footer{
    position:fixed; left:0; right:0; bottom:0; max-width:560px; margin:0 auto;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, rgba(5,5,9,0.95) 42%);
    display:flex; gap:10px; z-index:22;
  }

  /* ---- Bottom sheet ---- */
  #sheetOverlay{ position:fixed; inset:0; z-index:25; background:rgba(0,0,0,0.55); display:none; align-items:flex-end; justify-content:center; }
  #sheetOverlay.open{ display:flex; }
  .sheet{
    width:100%; max-width:560px; background:#15141c;
    border:1px solid rgba(255,255,255,0.08); border-radius:22px 22px 0 0;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    animation: sheetUp .3s cubic-bezier(.2,.9,.3,1);
  }
  @keyframes sheetUp{ from{ transform:translateY(100%);} to{transform:translateY(0);} }
  .sheet-handle{ width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,0.18); margin:2px auto 12px; }
  .sheet-title{ font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em; padding:2px 14px 8px; font-family:var(--font-mono); }
  .sheet-item{ display:flex; align-items:center; gap:13px; padding:13px 14px; border-radius:13px; font-size:15.5px; font-weight:550; color:var(--text); cursor:pointer; }
  .sheet-item:active{ background:rgba(255,255,255,0.07); }
  .sheet-item.danger{ color:var(--danger); }
  .sheet-item svg{ width:19px; height:19px; flex:none; opacity:0.9; }
  .sheet-cancel{ margin-top:6px; text-align:center; padding:14px; font-weight:600; color:var(--text-dim); border-top:1px solid rgba(255,255,255,0.07); cursor:pointer; }

  .toast{
    position:fixed; left:50%; bottom:100px; transform:translateX(-50%);
    background:rgba(21,20,28,0.96); border:1px solid rgba(255,255,255,0.09);
    color:var(--text); padding:10px 16px; border-radius:12px; font-size:13px;
    font-family:var(--font-mono);
    z-index:30; opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="ambient"></div>

<div id="app">
  <header>
    <div class="title-row">
      <div class="title-normal">
        <h1>Files</h1>
        <div class="header-actions">
          <button class="iconbtn" id="selectToggleBtn" aria-label="Select">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><rect x="3" y="3" width="18" height="18" rx="5"/></svg>
          </button>
          <button class="iconbtn" id="refreshBtn" aria-label="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v6h6M20 20v-6h-6M4.5 15a8 8 0 0014.7 3.2M19.5 9A8 8 0 004.8 5.8"/></svg>
          </button>
        </div>
      </div>
      <div class="title-selecting">
        <span class="sel-count" id="selCount">0 selected</span>
        <button class="iconbtn" id="cancelSelectBtn" aria-label="Cancel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </div>
    <div class="path-row" id="pathRow"></div>
  </header>

  <div id="list"></div>

  <div id="dropzone">
    <div class="dock-normal">
      <button class="fab" id="newBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v8M8 12h8"/><rect x="3" y="5" width="18" height="14" rx="3"/></svg>
        New
      </button>
      <button class="fab primary" id="uploadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M7 9l5-5 5 5M4 20h16"/></svg>
        Upload
      </button>
    </div>
    <div class="dock-select">
      <button class="fab" id="bulkMoveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7a2 2 0 012-2h4l2 2h6a2 2 0 012 2v7a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/><path d="M12 11v5M9.5 13.5L12 11l2.5 2.5"/></svg>
        Move
      </button>
      <button class="fab" id="bulkCopyBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
        Copy
      </button>
      <button class="fab danger" id="bulkDeleteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-8 0v12a2 2 0 002 2h6a2 2 0 002-2V7"/></svg>
        Delete
      </button>
    </div>
    <input type="file" id="fileInput" multiple>
  </div>
</div>

<!-- preview / editor overlay -->
<div class="overlay" id="preview">
  <div class="overlay-bar">
    <div class="overlay-name" id="previewName"></div>
    <div class="overlay-actions" id="previewActions">
      <button class="iconbtn" id="editBtn" aria-label="Edit" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
      <button class="iconbtn" id="saveBtn" aria-label="Save" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
      </button>
      <button class="iconbtn" id="closePreview" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
  </div>
  <div class="overlay-body" id="previewBody"></div>
</div>

<!-- destination picker overlay -->
<div class="overlay" id="picker">
  <div class="overlay-bar">
    <div class="overlay-name" id="pickerTitle">Choose a folder</div>
    <button class="iconbtn" id="pickerClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="path-row" id="pickerPathRow" style="padding:0 16px 8px;"></div>
  <div id="pickerBody"></div>
  <div class="picker-footer">
    <button class="fab primary" id="pickerConfirm" style="flex:1">Move here</button>
  </div>
</div>

<!-- generic bottom sheet -->
<div id="sheetOverlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — swap USE_MOCK to false once the backend is live.
   Backend contract (all paths are absolute strings):

   GET  /api/list?path=/some/dir
     -> { path, entries: [{ name, type: "dir"|"file", size, mtime }] }

   GET  /api/file?path=/some/dir/file.txt&mode=text|raw
     -> text/plain body (mode=text) or the raw file (mode=raw)

   POST /api/file      { path, content }   -> create or overwrite a text file
   POST /api/mkdir     { path }            -> create a folder
   POST /api/rename    { path, name }      -> rename file/folder in place
   POST /api/move      { from, to }        -> move file/folder into dir `to`
   POST /api/copy      { from, to }        -> copy file/folder into dir `to`
   POST /api/delete    { path }            -> delete file/folder (recursive)
   POST /api/upload    (multipart: file, path) -> save an uploaded file
   ============================================================ */
const CONFIG = {
  API_BASE: '',
  USE_MOCK: false   // server.py is live — flip back to true only for offline UI testing
};

const ASSETS = { glass: 'glass-bar.png', folder: 'folder-icon.png' };

const CODE_EXT = new Set(['js','ts','jsx','tsx','py','html','css','json','md','sh','yml','yaml','c','cpp','h','java','go','rs','rb','php','sql','txt','env','conf','ini','xml']);
const IMG_EXT  = new Set(['png','jpg','jpeg','gif','webp','svg','bmp','avif']);
const VID_EXT  = new Set(['mp4','webm','mov','mkv','avi']);

/* ---- mock filesystem (only used while USE_MOCK is true) ---- */
const MOCK_FS = {
  '/': [
    { name:'projects', type:'dir' },
    { name:'media', type:'dir' },
    { name:'notes.md', type:'file', size:2140, mtime:'2026-07-10T10:20:00Z' },
    { name:'deploy.sh', type:'file', size:512, mtime:'2026-07-12T09:00:00Z' },
  ],
  '/projects': [
    { name:'glass-fm', type:'dir' },
    { name:'node-cms', type:'dir' },
    { name:'README.md', type:'file', size:980, mtime:'2026-06-30T14:00:00Z' },
  ],
  '/projects/glass-fm': [
    { name:'index.html', type:'file', size:15280, mtime:'2026-07-14T12:00:00Z' },
    { name:'server.py', type:'file', size:3300, mtime:'2026-07-14T11:40:00Z' },
  ],
  '/projects/node-cms': [],
  '/media': [
    { name:'sunset.jpg', type:'file', size:842112, mtime:'2026-07-01T18:22:00Z' },
    { name:'demo-clip.mp4', type:'file', size:4104032, mtime:'2026-07-05T08:15:00Z' },
  ],
};
const MOCK_CONTENT = {
  '/notes.md': '# scratch\n\n- wire real API into fetchListing()\n- test on HF docker space\n- test on linux VM\n- test on TMX\n',
  '/deploy.sh': '#!/usr/bin/env bash\nset -e\nrsync -av ./ user@host:/srv/app\nssh user@host "pm2 restart app"\n',
  '/projects/README.md': '# projects\n\nEverything in here deploys as a single commit-ready zip.\n',
  '/projects/glass-fm/server.py': '# stub — real endpoint lives here\n# GET /api/list, GET /api/file, POST /api/mkdir, /api/file,\n# /api/rename, /api/move, /api/copy, /api/delete, /api/upload\n',
};

/* ---- state ---- */
let currentPath = '/';
let lastEntries = [];
let selectionMode = false;
let selected = new Set(); // full paths

/* ---- path helpers ---- */
function joinPath(base, name){ return base === '/' ? `/${name}` : `${base}/${name}`; }
function parentOf(path){
  if (path === '/') return '/';
  const parts = path.split('/').filter(Boolean);
  parts.pop();
  return parts.length ? '/' + parts.join('/') : '/';
}
function baseName(path){ const parts = path.split('/').filter(Boolean); return parts[parts.length-1] || ''; }
function extOf(name){ const i = name.lastIndexOf('.'); return i === -1 ? '' : name.slice(i+1).toLowerCase(); }

/* ---- mock fs mutation helpers ---- */
function rekeyPaths(oldPath, newPath, { copy=false } = {}){
  const oldPrefix = oldPath + '/';
  const newPrefix = newPath + '/';
  for (const store of [MOCK_FS, MOCK_CONTENT]){
    const keys = Object.keys(store).filter(k => k === oldPath || k.startsWith(oldPrefix));
    for (const k of keys){
      const nk = k === oldPath ? newPath : newPrefix + k.slice(oldPrefix.length);
      const val = store[k];
      store[nk] = copy ? JSON.parse(JSON.stringify(val)) : val;
      if (!copy) delete store[k];
    }
  }
}
function deletePaths(path){
  const prefix = path + '/';
  for (const store of [MOCK_FS, MOCK_CONTENT]){
    for (const k of Object.keys(store)){
      if (k === path || k.startsWith(prefix)) delete store[k];
    }
  }
}
function findEntry(parent, name){ return (MOCK_FS[parent] || []).find(e => e.name === name); }

/* ---- API layer (mock now, real later — call sites don't change) ---- */
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchListing(path){
  if (CONFIG.USE_MOCK){
    await sleep(110);
    return { path, entries: MOCK_FS[path] || [] };
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/list?path=${encodeURIComponent(path)}`);
  if (!res.ok) throw new Error('list failed');
  return res.json();
}

async function fetchFileText(path){
  if (CONFIG.USE_MOCK){
    await sleep(70);
    return MOCK_CONTENT[path] ?? '';
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/file?path=${encodeURIComponent(path)}&mode=text`);
  if (!res.ok) throw new Error('read failed');
  return res.text();
}

function fileRawUrl(path){
  if (CONFIG.USE_MOCK) return null;
  return `${CONFIG.API_BASE}/api/file?path=${encodeURIComponent(path)}&mode=raw`;
}

async function saveFile(path, content){
  if (CONFIG.USE_MOCK){
    await sleep(100);
    const parent = parentOf(path), name = baseName(path);
    if (!findEntry(parent, name)){
      (MOCK_FS[parent] || (MOCK_FS[parent] = [])).push({ name, type:'file', size:content.length, mtime:new Date().toISOString() });
    } else {
      findEntry(parent, name).size = content.length;
      findEntry(parent, name).mtime = new Date().toISOString();
    }
    MOCK_CONTENT[path] = content;
    return;
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/file`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path, content })
  });
  if (!res.ok) throw new Error('save failed');
}

async function mkdir(path){
  if (CONFIG.USE_MOCK){
    await sleep(100);
    (MOCK_FS[parentOf(path)] || (MOCK_FS[parentOf(path)] = [])).push({ name: baseName(path), type:'dir' });
    MOCK_FS[path] = MOCK_FS[path] || [];
    return;
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/mkdir`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path })
  });
  if (!res.ok) throw new Error('mkdir failed');
}

async function renamePath(path, newName){
  if (CONFIG.USE_MOCK){
    await sleep(90);
    const parent = parentOf(path), oldName = baseName(path);
    const entry = findEntry(parent, oldName);
    if (entry) entry.name = newName;
    rekeyPaths(path, joinPath(parent, newName));
    return;
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/rename`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path, name:newName })
  });
  if (!res.ok) throw new Error('rename failed');
}

async function movePath(path, toDir){
  if (CONFIG.USE_MOCK){
    await sleep(110);
    const parent = parentOf(path), name = baseName(path);
    const list = MOCK_FS[parent] || [];
    const idx = list.findIndex(e => e.name === name);
    const entry = idx > -1 ? list.splice(idx,1)[0] : { name, type:'file' };
    (MOCK_FS[toDir] || (MOCK_FS[toDir] = [])).push(entry);
    rekeyPaths(path, joinPath(toDir, name));
    return;
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/move`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ from:path, to:toDir })
  });
  if (!res.ok) throw new Error('move failed');
}

async function copyPath(path, toDir){
  if (CONFIG.USE_MOCK){
    await sleep(130);
    const parent = parentOf(path), name = baseName(path);
    const entry = findEntry(parent, name);
    (MOCK_FS[toDir] || (MOCK_FS[toDir] = [])).push(entry ? { ...entry } : { name, type:'file' });
    rekeyPaths(path, joinPath(toDir, name), { copy:true });
    return;
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/copy`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ from:path, to:toDir })
  });
  if (!res.ok) throw new Error('copy failed');
}

async function deletePath(path){
  if (CONFIG.USE_MOCK){
    await sleep(100);
    const parent = parentOf(path), name = baseName(path);
    const list = MOCK_FS[parent] || [];
    const idx = list.findIndex(e => e.name === name);
    if (idx > -1) list.splice(idx,1);
    deletePaths(path);
    return;
  }
  const res = await fetch(`${CONFIG.API_BASE}/api/delete`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path })
  });
  if (!res.ok) throw new Error('delete failed');
}

async function uploadFiles(files){
  if (CONFIG.USE_MOCK){
    await sleep(200);
    const parent = MOCK_FS[currentPath] || (MOCK_FS[currentPath] = []);
    for (const f of files) parent.push({ name:f.name, type:'file', size:f.size, mtime:new Date().toISOString() });
    return;
  }
  for (const f of files){
    const fd = new FormData();
    fd.append('file', f);
    fd.append('path', joinPath(currentPath, f.name));
    const res = await fetch(`${CONFIG.API_BASE}/api/upload`, { method:'POST', body: fd });
    if (!res.ok) throw new Error(`upload failed: ${f.name}`);
  }
}

/* ---- formatting ---- */
function fmtSize(bytes){
  if (bytes == null) return '';
  if (bytes < 1024) return `${bytes} B`;
  const units = ['KB','MB','GB']; let v = bytes/1024, u = 0;
  while (v >= 1024 && u < units.length-1){ v/=1024; u++; }
  return `${v.toFixed(1)} ${units[u]}`;
}
function fmtDate(iso){
  if (!iso) return '';
  return new Date(iso).toLocaleDateString(undefined,{ month:'short', day:'numeric' });
}
function fileGlyph(name){
  const ext = extOf(name);
  if (IMG_EXT.has(ext)) return '🖼';
  if (VID_EXT.has(ext)) return '▶';
  if (CODE_EXT.has(ext)) return '{ }';
  return '·';
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---- row rendering ---- */
function buildRow(entry){
  const row = document.createElement('div');
  row.className = 'row';
  const fullPath = joinPath(currentPath, entry.name);

  const bg = document.createElement('img');
  bg.className = 'glass-bg'; bg.src = ASSETS.glass; bg.alt = '';
  row.appendChild(bg);

  const tint = document.createElement('div');
  tint.className = 'tint';
  row.appendChild(tint);

  const checkbox = document.createElement('div');
  checkbox.className = 'checkbox';
  checkbox.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#08080d" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>';
  row.appendChild(checkbox);

  const iconWrap = document.createElement('div');
  iconWrap.className = 'icon-wrap';
  if (entry.type === 'dir'){
    const icon = document.createElement('img'); icon.src = ASSETS.folder; icon.alt = 'folder';
    iconWrap.appendChild(icon);
  } else {
    iconWrap.classList.add('file-icon');
    iconWrap.textContent = fileGlyph(entry.name);
  }
  row.appendChild(iconWrap);

  const meta = document.createElement('div');
  meta.className = 'meta';
  const name = document.createElement('div'); name.className = 'name'; name.textContent = entry.name;
  const sub = document.createElement('div'); sub.className = 'sub';
  sub.textContent = entry.type === 'dir' ? 'folder' : [fmtSize(entry.size), fmtDate(entry.mtime)].filter(Boolean).join(' · ');
  meta.append(name, sub);
  row.appendChild(meta);

  if (entry.type === 'dir'){
    const chev = document.createElement('div');
    chev.className = 'chev';
    chev.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>';
    row.appendChild(chev);
  }

  const kebab = document.createElement('div');
  kebab.className = 'kebab';
  kebab.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>';
  kebab.addEventListener('click', (e) => { e.stopPropagation(); openItemActions(entry, fullPath); });
  row.appendChild(kebab);

  row.addEventListener('pointerdown', () => row.classList.add('sweep'));
  row.addEventListener('animationend', () => row.classList.remove('sweep'));

  row.addEventListener('click', () => {
    if (selectionMode){
      toggleSelected(fullPath, row);
      return;
    }
    if (entry.type === 'dir') navigate(fullPath);
    else openPreview(fullPath, entry.name);
  });

  if (selected.has(fullPath)) row.classList.add('checked');
  return row;
}

function renderRows(entries){
  const list = document.getElementById('list');
  list.innerHTML = '';
  if (!entries.length){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'nothing here yet';
    list.appendChild(empty);
    return;
  }
  const sorted = [...entries].sort((a,b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));
  const frag = document.createDocumentFragment();
  sorted.forEach(e => frag.appendChild(buildRow(e)));
  list.appendChild(frag);
}

async function navigate(path){
  currentPath = path;
  exitSelection();
  renderBreadcrumbs(path, document.getElementById('pathRow'), navigate);
  try{
    const { entries } = await fetchListing(path);
    lastEntries = entries;
    renderRows(entries);
  } catch(err){
    toast('could not load this folder');
    console.error(err);
  }
}

function renderBreadcrumbs(path, container, onNav){
  container.innerHTML = '';
  const parts = path === '/' ? [] : path.split('/').filter(Boolean);
  const crumbs = [{ label:'~', path:'/' }, ...parts.map((p,i) => ({ label:p, path:'/' + parts.slice(0,i+1).join('/') }))];
  crumbs.forEach((c, i) => {
    const el = document.createElement('span');
    el.className = 'crumb';
    el.textContent = c.label;
    el.addEventListener('click', () => onNav(c.path));
    container.appendChild(el);
    if (i < crumbs.length - 1){
      const sep = document.createElement('span'); sep.className = 'crumb-sep'; sep.textContent = '/';
      container.appendChild(sep);
    } else {
      const cur = document.createElement('span'); cur.className = 'cursor';
      container.appendChild(cur);
    }
  });
}

/* ---- selection mode ---- */
function toggleSelected(fullPath, row){
  if (selected.has(fullPath)){ selected.delete(fullPath); row.classList.remove('checked'); }
  else { selected.add(fullPath); row.classList.add('checked'); }
  updateSelCount();
}
function updateSelCount(){
  document.getElementById('selCount').textContent = `${selected.size} selected`;
}
function enterSelection(){
  selectionMode = true; selected.clear();
  document.getElementById('list').classList.add('selecting');
  document.getElementById('dropzone').classList.add('selecting');
  document.querySelector('header').classList.add('selecting');
  updateSelCount();
}
function exitSelection(){
  selectionMode = false; selected.clear();
  document.getElementById('list').classList.remove('selecting');
  document.getElementById('dropzone').classList.remove('selecting');
  document.querySelector('header').classList.remove('selecting');
}
document.getElementById('selectToggleBtn').addEventListener('click', enterSelection);
document.getElementById('cancelSelectBtn').addEventListener('click', exitSelection);

/* ---- bottom sheet ---- */
function openSheet(title, items){
  const overlay = document.getElementById('sheetOverlay');
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = '';
  const handle = document.createElement('div'); handle.className = 'sheet-handle'; sheet.appendChild(handle);
  if (title){ const t = document.createElement('div'); t.className = 'sheet-title'; t.textContent = title; sheet.appendChild(t); }
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'sheet-item' + (item.danger ? ' danger' : '');
    el.innerHTML = `${item.icon || ''}<span>${item.label}</span>`;
    el.addEventListener('click', () => { closeSheet(); item.onClick(); });
    sheet.appendChild(el);
  });
  const cancel = document.createElement('div'); cancel.className = 'sheet-cancel'; cancel.textContent = 'Cancel';
  cancel.addEventListener('click', closeSheet);
  sheet.appendChild(cancel);
  overlay.classList.add('open');
}
function closeSheet(){ document.getElementById('sheetOverlay').classList.remove('open'); }
document.getElementById('sheetOverlay').addEventListener('click', (e) => { if (e.target.id === 'sheetOverlay') closeSheet(); });

const ICONS = {
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
  rename:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L18.5 9.5a2.1 2.1 0 000-3l-1-1a2.1 2.1 0 00-3 0L4 15v5z"/></svg>',
  move:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7a2 2 0 012-2h4l2 2h6a2 2 0 012 2v7a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/><path d="M12 11v5M9.5 13.5L12 11l2.5 2.5"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>',
  delete:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-8 0v12a2 2 0 002 2h6a2 2 0 002-2V7"/></svg>',
  folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/></svg>',
};

function openItemActions(entry, fullPath){
  const items = [];
  if (entry.type === 'file' && CODE_EXT.has(extOf(entry.name))){
    items.push({ label:'Edit', icon:ICONS.edit, onClick:() => openPreview(fullPath, entry.name, { startEditing:true }) });
  }
  items.push({ label:'Rename', icon:ICONS.rename, onClick:() => doRename(fullPath, entry.name) });
  items.push({ label:'Move', icon:ICONS.move, onClick:() => doMoveOrCopy('move', [fullPath]) });
  items.push({ label:'Copy', icon:ICONS.copy, onClick:() => doMoveOrCopy('copy', [fullPath]) });
  items.push({ label:'Delete', icon:ICONS.delete, danger:true, onClick:() => doDelete([fullPath], entry.name) });
  openSheet(entry.name, items);
}

document.getElementById('newBtn').addEventListener('click', () => {
  openSheet('Create new', [
    { label:'New folder', icon:ICONS.folder, onClick: createFolderFlow },
    { label:'New file', icon:ICONS.file, onClick: createFileFlow },
  ]);
});

async function createFolderFlow(){
  const name = prompt('Folder name');
  if (!name) return;
  try{ await mkdir(joinPath(currentPath, name)); toast(`Created ${name}`); navigate(currentPath); }
  catch(err){ toast('Could not create folder'); }
}
async function createFileFlow(){
  const name = prompt('File name (e.g. notes.md)');
  if (!name) return;
  try{ await saveFile(joinPath(currentPath, name), ''); toast(`Created ${name}`); navigate(currentPath); }
  catch(err){ toast('Could not create file'); }
}

async function doRename(fullPath, oldName){
  const name = prompt('Rename', oldName);
  if (!name || name === oldName) return;
  try{ await renamePath(fullPath, name); toast('Renamed'); navigate(currentPath); }
  catch(err){ toast('Rename failed'); }
}

async function doDelete(paths, label){
  const msg = paths.length > 1 ? `Delete ${paths.length} items? This can't be undone.` : `Delete "${label}"? This can't be undone.`;
  if (!confirm(msg)) return;
  try{
    for (const p of paths) await deletePath(p);
    toast(paths.length > 1 ? `Deleted ${paths.length} items` : 'Deleted');
    exitSelection();
    navigate(currentPath);
  } catch(err){ toast('Delete failed'); }
}

/* ---- destination picker ---- */
let pickerPath = '/';
let pickerMode = 'move';
let pickerSources = [];

function doMoveOrCopy(mode, sources){
  pickerMode = mode; pickerSources = sources; pickerPath = '/';
  document.getElementById('pickerTitle').textContent = mode === 'move' ? 'Move to…' : 'Copy to…';
  document.getElementById('pickerConfirm').textContent = mode === 'move' ? 'Move here' : 'Copy here';
  document.getElementById('picker').classList.add('open');
  renderPicker(pickerPath);
}
async function renderPicker(path){
  pickerPath = path;
  renderBreadcrumbs(path, document.getElementById('pickerPathRow'), renderPicker);
  const body = document.getElementById('pickerBody');
  body.innerHTML = '';
  try{
    const { entries } = await fetchListing(path);
    const dirs = entries.filter(e => e.type === 'dir');
    if (!dirs.length){
      const empty = document.createElement('div'); empty.className = 'picker-empty'; empty.textContent = 'no subfolders here';
      body.appendChild(empty);
      return;
    }
    dirs.forEach(d => {
      const row = document.createElement('div'); row.className = 'picker-row';
      const bg = document.createElement('img'); bg.className = 'glass-bg'; bg.src = ASSETS.glass;
      const tint = document.createElement('div'); tint.className = 'tint';
      const icon = document.createElement('img'); icon.className = 'icn'; icon.src = ASSETS.folder;
      const name = document.createElement('div'); name.className = 'pname'; name.textContent = d.name;
      row.append(bg, tint, icon, name);
      row.addEventListener('click', () => renderPicker(joinPath(path, d.name)));
      body.appendChild(row);
    });
  } catch(err){ toast('Could not load folders'); }
}
document.getElementById('pickerClose').addEventListener('click', () => document.getElementById('picker').classList.remove('open'));
document.getElementById('pickerConfirm').addEventListener('click', async () => {
  document.getElementById('picker').classList.remove('open');
  try{
    for (const src of pickerSources){
      if (src === pickerPath || pickerPath.startsWith(src + '/')) { toast("Can't move a folder into itself"); return; }
      if (pickerMode === 'move') await movePath(src, pickerPath);
      else await copyPath(src, pickerPath);
    }
    toast(pickerMode === 'move' ? 'Moved' : 'Copied');
    exitSelection();
    navigate(currentPath);
  } catch(err){ toast(pickerMode === 'move' ? 'Move failed' : 'Copy failed'); }
});

/* ---- bulk actions ---- */
document.getElementById('bulkMoveBtn').addEventListener('click', () => {
  if (!selected.size) return toast('Nothing selected');
  doMoveOrCopy('move', [...selected]);
});
document.getElementById('bulkCopyBtn').addEventListener('click', () => {
  if (!selected.size) return toast('Nothing selected');
  doMoveOrCopy('copy', [...selected]);
});
document.getElementById('bulkDeleteBtn').addEventListener('click', () => {
  if (!selected.size) return toast('Nothing selected');
  doDelete([...selected], null);
});

/* ---- preview / editor ---- */
let previewPath = null;
let previewEditing = false;

async function openPreview(path, displayName, opts = {}){
  previewPath = path; previewEditing = false;
  const overlay = document.getElementById('preview');
  const body = document.getElementById('previewBody');
  document.getElementById('previewName').textContent = displayName;
  body.innerHTML = '';
  overlay.classList.add('open');

  const ext = extOf(path);
  const editBtn = document.getElementById('editBtn');
  const saveBtn = document.getElementById('saveBtn');
  const isEditable = CODE_EXT.has(ext);
  editBtn.style.display = isEditable ? 'flex' : 'none';
  saveBtn.style.display = 'none';

  try{
    if (IMG_EXT.has(ext)){
      const url = fileRawUrl(path);
      if (url){ const img = document.createElement('img'); img.src = url; body.appendChild(img); }
      else body.innerHTML = '<div class="overlay-fallback">image preview needs a live backend<br>(mock mode has no real bytes)</div>';
    } else if (VID_EXT.has(ext)){
      const url = fileRawUrl(path);
      if (url){ const vid = document.createElement('video'); vid.src = url; vid.controls = true; body.appendChild(vid); }
      else body.innerHTML = '<div class="overlay-fallback">video preview needs a live backend<br>(mock mode has no real bytes)</div>';
    } else {
      const text = await fetchFileText(path);
      const pre = document.createElement('pre'); pre.textContent = text;
      body.appendChild(pre);
      if (opts.startEditing) enterEditMode(text);
    }
  } catch(err){
    body.innerHTML = '<div class="overlay-fallback">could not open this file</div>';
  }
}

function enterEditMode(text){
  previewEditing = true;
  const body = document.getElementById('previewBody');
  body.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.className = 'editor'; ta.id = 'editorArea'; ta.value = text; ta.spellcheck = false;
  body.appendChild(ta);
  document.getElementById('editBtn').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'flex';
  ta.focus();
}

document.getElementById('editBtn').addEventListener('click', async () => {
  const text = await fetchFileText(previewPath);
  enterEditMode(text);
});
document.getElementById('saveBtn').addEventListener('click', async () => {
  const ta = document.getElementById('editorArea');
  try{
    await saveFile(previewPath, ta.value);
    toast('Saved');
    if (previewPath.startsWith(currentPath)) navigate(currentPath);
    document.getElementById('preview').classList.remove('open');
  } catch(err){ toast('Save failed'); }
});
document.getElementById('closePreview').addEventListener('click', () => {
  document.getElementById('preview').classList.remove('open');
});

/* ---- toolbar ---- */
document.getElementById('refreshBtn').addEventListener('click', () => navigate(currentPath));

const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  try{ await uploadFiles(files); toast(`Uploaded ${files.length} file${files.length>1?'s':''}`); navigate(currentPath); }
  catch(err){ toast('Upload failed'); }
  finally { fileInput.value = ''; }
});

/* ---- boot ---- */
navigate('/');
</script>
